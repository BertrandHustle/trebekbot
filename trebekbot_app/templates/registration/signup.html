{% extends "trebekbot_app/base.html" %}

{% block content %}

  <head>
      <meta charset="UTF-8">
      <title>Sign Up</title>
  </head>

  <form method="post" action="{% url 'signup' %}">
    {% csrf_token %}
    <table>
      <tr>
        <td>{{ form.username.label_tag }}</td>
        <td>{{ form.username }}</td>
      </tr>
      <tr>
        <td>{{ form.password.label_tag }}</td>
        <td>{{ form.password }}</td>
      </tr>
    </table>
    <input type="submit" value="signup" />
    <input type="hidden" name="next" value="{{ next }}" />
  </form>

{% endblock %}
